[workspace]
members = [
  "tailscope-core",
  "tailscope-tokio",
  "tailscope-cli",
  "tailscope-macros",
  "demos/queue_service",
  "demos/blocking_service",
  "demos/downstream_service",
  "demos/runtime_cost",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.lints.rust]
unsafe_code = "forbid"
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(tokio_unstable)"] }

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
