[workspace]
members = [
  "tailtriage-core",
  "tailtriage-tokio",
  "tailtriage-cli",
  "tailtriage-macros",
  "demos/demo_support",
  "demos/queue_service",
  "demos/blocking_service",
  "demos/executor_pressure_service",
  "demos/downstream_service",
  "demos/mixed_contention_service",
  "demos/cold_start_burst_service",
  "demos/db_pool_saturation_service",
  "demos/shared_state_lock_service",
  "demos/runtime_cost",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.lints.rust]
unsafe_code = "forbid"
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(tokio_unstable)"] }

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
