name: CI

on:
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/build.rs"
      - "scripts/**/*.py"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
  push:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/build.rs"
      - "scripts/**/*.py"
      - "rust-toolchain"
      - "rust-toolchain.toml"
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: fmt / clippy / test / demos
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --locked

      - name: Validate queue demo
        run: python3 scripts/demo_tool.py validate queue

      - name: Validate blocking demo
        run: python3 scripts/demo_tool.py validate blocking

      - name: Validate downstream demo
        run: python3 scripts/demo_tool.py validate downstream
